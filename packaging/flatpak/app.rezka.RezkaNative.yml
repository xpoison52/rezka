# Flatpak-манифест (через pip, без PyInstaller).
# Сборка локально: flatpak-builder --user --install-deps-from=flathub --force-clean build-dir packaging/flatpak/app.rezka.RezkaNative.yml
# При публикации на Flathub замените app-id на свой (например io.github.<user>.rezka-native).
app-id: app.rezka.RezkaNative
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: rezka-native

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio

modules:
  - name: rezka-native
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    sources:
      - type: dir
        path: ../..
    build-commands:
      - install -Dm644 main.py /app/share/rezka/main.py
      - install -Dm644 main.qml /app/share/rezka/main.qml
      - pip3 install --verbose --exists-action=i --prefix=/app --no-cache-dir -r requirements.txt
      - install -Dm755 packaging/flatpak/rezka-launch /app/bin/rezka-native
